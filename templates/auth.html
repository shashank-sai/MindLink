<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindLink - Login / Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-color: #3498db;
        --secondary-color: #2c3e50;
        --accent-color: #9b59b6;
        --success-color: #27ae60;
        --danger-color: #e74c3c;
        --warning-color: #f39c12;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .auth-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        max-width: 450px;
        width: 100%;
      }

      .auth-header {
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-color)
        );
        color: white;
        padding: 2rem;
        text-align: center;
      }

      .auth-header h2 {
        margin: 0;
        font-weight: 600;
      }

      .auth-header p {
        margin: 0.5rem 0 0;
        opacity: 0.9;
      }

      .auth-body {
        padding: 2rem;
      }

      .tab-content {
        margin-top: 1rem;
      }

      .form-control {
        border-radius: 10px;
        padding: 0.75rem 1rem;
        border: 2px solid #e0e0e0;
      }

      .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      }

      .btn-primary {
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-color)
        );
        border: none;
        border-radius: 10px;
        padding: 0.75rem;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
      }

      .nav-tabs {
        border-bottom: 2px solid #e0e0e0;
      }

      .nav-tabs .nav-link {
        color: var(--secondary-color);
        border: none;
        padding: 1rem 1.5rem;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .nav-tabs .nav-link.active {
        color: var(--primary-color);
        border-bottom: 3px solid var(--primary-color);
      }

      .nav-tabs .nav-link:hover {
        color: var(--accent-color);
      }

      .alert {
        border-radius: 10px;
        margin-bottom: 1rem;
      }

      .loading-spinner {
        display: none;
        text-align: center;
        padding: 1rem;
      }

      .loading-spinner.show {
        display: block;
      }

      .form-label {
        font-weight: 500;
        color: var(--secondary-color);
        margin-bottom: 0.5rem;
      }

      .input-group-text {
        background: white;
        border: 2px solid #e0e0e0;
        border-right: none;
        border-radius: 10px 0 0 10px;
      }

      .input-group .form-control {
        border-left: none;
        border-radius: 0 10px 10px 0;
      }

      .input-group .form-control:focus {
        border-left: none;
      }

      .input-group.focus {
        border-color: var(--primary-color);
      }

      .disclaimer-text {
        font-size: 0.85rem;
        color: #666;
        text-align: center;
        margin-top: 1.5rem;
        padding: 1rem;
        background: #fff8e1;
        border-radius: 10px;
        border-left: 4px solid var(--warning-color);
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-header">
        <h2><i class="fas fa-comments me-2"></i>MindLink</h2>
        <p>Your AI-powered mental health companion</p>
      </div>

      <div class="auth-body">
        <!-- Alert placeholder -->
        <div id="alert-placeholder"></div>

        <!-- Loading spinner -->
        <div class="loading-spinner" id="loading-spinner">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-2">Please wait...</p>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs" id="authTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active"
              id="login-tab"
              data-bs-toggle="tab"
              data-bs-target="#login"
              type="button"
            >
              <i class="fas fa-sign-in-alt me-1"></i> Login
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="register-tab"
              data-bs-toggle="tab"
              data-bs-target="#register"
              type="button"
            >
              <i class="fas fa-user-plus me-1"></i> Register
            </button>
          </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="authTabContent">
          <!-- Login Form -->
          <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form id="login-form" class="mt-4">
              <div class="mb-3">
                <label for="login-username" class="form-label"
                  >Username or Email</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="login-username"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="login-password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="login-password"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-1"></i> Login
              </button>
            </form>
          </div>

          <!-- Register Form -->
          <div class="tab-pane fade" id="register" role="tabpanel">
            <form id="register-form" class="mt-4">
              <div class="mb-3">
                <label for="register-username" class="form-label"
                  >Username</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="register-username"
                  required
                  minlength="3"
                />
              </div>
              <div class="mb-3">
                <label for="register-email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="register-email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="register-password" class="form-label"
                  >Password</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="register-password"
                  required
                  minlength="8"
                />
                <small class="text-muted">Minimum 8 characters</small>
              </div>
              <div class="mb-3">
                <label for="register-preferred-name" class="form-label"
                  >Preferred Name (Optional)</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="register-preferred-name"
                />
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus me-1"></i> Register
              </button>
            </form>
          </div>
        </div>

        <div class="disclaimer-text">
          <i class="fas fa-exclamation-triangle me-1"></i>
          <strong>Important:</strong> MindLink is an AI assistant, not a
          substitute for professional medical advice.
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Store auth token
      let authToken = localStorage.getItem("authToken") || null;

      // Check if already logged in
      document.addEventListener("DOMContentLoaded", function () {
        if (authToken) {
          // Verify token is still valid
          verifyToken();
        }
      });

      function verifyToken() {
        fetch("/api/auth/me", {
          headers: {
            Authorization: `Bearer ${authToken}`,
          },
        })
          .then((response) => {
            if (response.ok) {
              window.location.href = "/chat";
            } else {
              localStorage.removeItem("authToken");
            }
          })
          .catch(() => {
            localStorage.removeItem("authToken");
          });
      }

      function showAlert(message, type = "danger") {
        const placeholder = document.getElementById("alert-placeholder");
        const alertClass =
          type === "success" ? "alert-success" : "alert-danger";
        const icon =
          type === "success" ? "fa-check-circle" : "fa-exclamation-circle";

        placeholder.innerHTML = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    <i class="fas ${icon} me-2"></i>${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
      }

      function showLoading(show) {
        document
          .getElementById("loading-spinner")
          .classList.toggle("show", show);
        document.getElementById("login-form").style.display = show
          ? "none"
          : "block";
        document.getElementById("register-form").style.display = show
          ? "none"
          : "block";
      }

      // Login form
      document
        .getElementById("login-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          showLoading(true);

          const username = document.getElementById("login-username").value;
          const password = document.getElementById("login-password").value;

          try {
            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (data.success) {
              localStorage.setItem("authToken", data.data.token);
              window.location.href = "/chat";
            } else {
              showAlert(data.error || "Login failed");
              showLoading(false);
            }
          } catch (error) {
            showAlert("Connection error. Please try again.");
            showLoading(false);
          }
        });

      // Register form
      document
        .getElementById("register-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          showLoading(true);

          const username = document.getElementById("register-username").value;
          const email = document.getElementById("register-email").value;
          const password = document.getElementById("register-password").value;
          const preferred_name = document.getElementById(
            "register-preferred-name",
          ).value;

          try {
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                username,
                email,
                password,
                preferred_name,
              }),
            });

            const data = await response.json();

            if (data.success) {
              showAlert("Registration successful! Please login.", "success");
              // Switch to login tab
              const loginTab = document.querySelector("#login-tab");
              const tab = new bootstrap.Tab(loginTab);
              tab.show();
              document.getElementById("login-username").value = username;
            } else {
              showAlert(data.error || "Registration failed");
            }
            showLoading(false);
          } catch (error) {
            showAlert("Connection error. Please try again.");
            showLoading(false);
          }
        });
    </script>
  </body>
</html>
